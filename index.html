<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DokuDay - Legal</title>
  <style>
    :root {
      --bg: #f3f7fa;
      --card: #ffffff;
      --text: #082e49;
      --muted: #607486;
      --line: #d8e2ea;
      --mint: #05c7a2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      width: min(720px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: clamp(28px, 6vw, 56px);
      box-shadow: 0 20px 55px rgba(8, 46, 73, 0.08);
    }
    .brand {
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: 13px;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0;
      font-size: clamp(40px, 7vw, 64px);
      line-height: 1;
      letter-spacing: 0;
    }
    p {
      color: #2f4858;
      font-size: 18px;
      line-height: 1.55;
      margin: 20px 0 28px;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      padding: 0 24px;
      border-radius: 18px;
      background: var(--text);
      color: #ffffff;
      text-decoration: none;
      font-weight: 800;
      font-size: 16px;
    }
    a:hover { background: #0b3b5c; }
    footer {
      margin-top: 32px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">Korat Solutions</div>
    <h1>DokuDay</h1>
    <p>
      Documentos legales y de privacidad para DokuDay: Daily Sudoku.
    </p>
    <a href="./privacy-policy.html">Ver politica de privacidad</a>
    <a href="./account-deletion.html" style="margin-left: 12px; background: #eaf1f6; color: #082e49;">Eliminar cuenta</a>
    <footer>© Korat Solutions - DokuDay: Daily Sudoku</footer>
  </main>
</body>
</html>
